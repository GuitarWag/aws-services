  {r:"Amazon A2I",           h:"Route low-confidence ML predictions to human reviewers",  d:"When your model isn't sure, A2I queues the item for a human to check. Integrates with Textract, Rekognition, and custom models.",                            c:"ML / AI"},
  {r:"Amazon PartyRock",     h:"No-code generative AI app builder for learning",          d:"Drag prompts and model widgets together to build apps — no API key, no code. Good for prototyping and learning prompt engineering.",                          c:"ML / AI"},
  {r:"Amazon Omics",         h:"Store and analyze genomics and proteomics data at scale", d:"Purpose-built for life sciences. Ingest FASTQ/BAM/VCF files, run bioinformatics workflows, and query variants across cohorts.",                              c:"ML / AI"},
  {r:"AWS DeepRacer",        h:"Learn reinforcement learning by racing a tiny car",       d:"A 1/18-scale autonomous race car. Train an RL model in simulation, deploy it to the physical car, race globally.",                                            c:"ML / AI"},
  {r:"AWS HealthLake",       h:"HIPAA-eligible lake for health records (FHIR format)",    d:"Normalizes clinical data from disparate sources into FHIR, making it queryable and ready for ML or analytics.",                                               c:"ML / AI"},
  {r:"AWS HealthScribe",     h:"Transcribe patient-clinician conversations into clinical notes",d:"Records a consultation, identifies who's speaking, extracts medical terms, and drafts a structured clinical note automatically.",                       c:"ML / AI"},
  {r:"AWS Panorama",         h:"Run computer vision models on your existing IP cameras",  d:"An edge appliance that connects to your camera network. Runs ML inference locally — no video upload to the cloud needed.",                                    c:"ML / AI"},
  {r:"Amazon Mechanical Turk",h:"Access a global crowd of human workers for tasks",     d:"Distribute image labeling, surveys, transcription, or any task that needs human judgment to thousands of workers via an API.",                   c:"ML / AI"},

  // ── Networking ──
  {r:"Amazon VPC",           h:"Your private, isolated section of the AWS network",       d:"Define your own IP ranges, subnets, route tables, and gateways. Everything you run in AWS lives inside a VPC.",                                              c:"Networking"},
  {r:"Amazon CloudFront",    h:"CDN — serve content from 400+ edge locations worldwide",  d:"Cache your assets, APIs, and video near your users. Also integrates with WAF and Shield for security at the edge.",                                           c:"Networking"},
  {r:"Amazon Route 53",      h:"DNS + domain registration + health-based routing",        d:"Buy domains, map them to AWS resources, and set routing policies (latency-based, geo, failover). Monitors endpoint health.",                                  c:"Networking"},
  {r:"AWS Direct Connect",   h:"Dedicated private fiber from your office to AWS",         d:"Bypasses the public internet entirely. More consistent latency and bandwidth, lower data transfer costs for high-volume workloads.",                          c:"Networking"},
  {r:"Elastic Load Balancing",h:"Automatically spread traffic across healthy instances",  d:"Three flavors: Application LB (HTTP/HTTPS, layer 7), Network LB (TCP, ultra-low latency), Gateway LB (third-party appliances).",                            c:"Networking"},
  {r:"AWS Global Accelerator",h:"Route users over AWS's backbone instead of the internet",d:"Your traffic enters AWS's private network at the nearest edge and stays there. Reduces jitter and improves availability for global apps.",                    c:"Networking"},
  {r:"Amazon API Gateway",   h:"A managed front door for your APIs",                      d:"Handle auth, rate limiting, request routing, and monitoring without building any of it yourself. Scales to millions of calls.",                               c:"Networking"},
  {r:"AWS Transit Gateway",  h:"Hub that connects all your VPCs and on-prem networks",   d:"Instead of peering every VPC to every other, connect all of them to one gateway. Dramatically simplifies large multi-account networks.",                     c:"Networking"},
  {r:"AWS PrivateLink",      h:"Access AWS services without leaving the AWS network",     d:"Traffic from your VPC to S3, DynamoDB, etc. never goes over the internet. Reduces attack surface.",                                                          c:"Networking"},
  {r:"AWS App Mesh",         h:"Service mesh for microservices observability and control",d:"Manages traffic between your containers and functions with consistent routing rules, retries, and observability — no code changes.",                          c:"Networking"},
  {r:"AWS Cloud Map",        h:"Service discovery — find your resources by name",         d:"Register your microservices with custom names; Cloud Map keeps their addresses up to date so services can always find each other.",                          c:"Networking"},
  {r:"Site-to-Site VPN",     h:"Encrypted tunnel from your network to your VPC",         d:"Connects your on-prem router to AWS over the internet, encrypted with IPSec. Cheaper and faster to set up than Direct Connect.",                             c:"Networking"},
  {r:"AWS Verified Access",  h:"Zero-trust access to corporate apps — no VPN",           d:"Evaluates every request against identity and device posture. Grants access per-application rather than putting users on the whole network.",                  c:"Networking"},
  {r:"Amazon VPC Lattice",   h:"Service-to-service networking across accounts and VPCs", d:"Handles auth, routing, and monitoring for cross-VPC service calls without custom code or complex VPC peering setups.",                                        c:"Networking"},
  {r:"AWS Private 5G",       h:"Deploy your own private cellular network on-premises",   d:"AWS ships you small cells, SIM cards, and the 5G core. Connect factory equipment, robots, or vehicles without Wi-Fi dead zones.",                            c:"Networking"},

  // ── Security ──
  {r:"AWS IAM",              h:"Control who can do what across all of AWS",              d:"The security backbone. Users, roles, groups, and policies define every permission. The first thing you configure on any AWS account.",                        c:"Security"},
  {r:"Amazon Cognito",       h:"Add user sign-up, sign-in, and auth to your app",        d:"Handles registration, login, MFA, and social sign-in (Google, Apple, Facebook). Returns JWT tokens. Scales to millions of users.",                          c:"Security"},
  {r:"AWS KMS",              h:"Create and control encryption keys",                     d:"Generates and stores cryptographic keys in HSMs. Almost every AWS service can encrypt data with a KMS key. Logs all key usage to CloudTrail.",               c:"Security"},
  {r:"AWS Secrets Manager",  h:"Store and auto-rotate passwords and API keys",           d:"Your app calls the API to get the current password; Secrets Manager rotates it on a schedule. No hardcoded secrets in code or config.",                      c:"Security"},
  {r:"Amazon GuardDuty",     h:"Threat detection — watches your logs for suspicious activity",d:"Analyzes CloudTrail, DNS, VPC Flow Logs, and S3 access with ML. Flags cryptocurrency mining, credential theft, unusual API calls.",                   c:"Security"},
  {r:"Amazon Inspector",     h:"Continuously scan for software vulnerabilities",         d:"Checks EC2 instances and container images against known CVE databases. Prioritizes findings by network exposure and exploitability.",                        c:"Security"},
  {r:"Amazon Macie",         h:"Find PII and sensitive data accidentally left in S3",    d:"Scans your buckets with ML to find credit cards, social security numbers, health records. Alerts on publicly exposed buckets.",                             c:"Security"},
  {r:"Amazon Detective",     h:"Investigate a security finding — trace it to root cause",d:"Automatically correlates GuardDuty findings, CloudTrail logs, and VPC flows into an interactive graph. Answers 'who did what, when, from where?'",          c:"Security"},
  {r:"AWS Security Hub",     h:"One dashboard for all your security findings",           d:"Aggregates alerts from GuardDuty, Inspector, Macie, Config, and partner tools. Scores your overall security posture.",                                      c:"Security"},
  {r:"AWS Shield",           h:"DDoS protection — Standard is free, Advanced is 24/7",  d:"Standard automatically protects all AWS resources at no cost. Advanced adds bigger mitigation capacity and a 24/7 response team.",                           c:"Security"},
  {r:"AWS WAF",              h:"Filter web traffic — block SQLi, XSS, bad bots",        d:"Rule-based firewall for CloudFront, ALB, and API Gateway. AWS-managed rule sets cover OWASP Top 10 out of the box.",                                        c:"Security"},
  {r:"AWS Certificate Manager",h:"Free SSL/TLS certificates, auto-renewed",             d:"Provision certs for your domains in minutes. Attach to CloudFront or ALB. AWS renews them automatically before they expire.",                               c:"Security"},
  {r:"AWS CloudHSM",         h:"Dedicated hardware security module for your keys",       d:"A physical HSM in AWS for when regulations require FIPS 140-2 Level 3 certification and you need sole custody of keys.",                                    c:"Security"},
  {r:"AWS Directory Service",h:"Managed Microsoft Active Directory in the cloud",        d:"Run AD without running Windows Server DCs. Join EC2 instances to a domain, use Group Policy, enable SSO for AWS apps.",                                     c:"Security"},
  {r:"AWS Firewall Manager", h:"Centrally deploy WAF and security group rules across all accounts",d:"Set a policy once in the management account; Firewall Manager pushes it to every account in the organization automatically.",                     c:"Security"},
  {r:"AWS IAM Identity Center",h:"Single sign-on across all AWS accounts and SaaS apps",d:"One login portal for all your AWS accounts. Also integrates with Salesforce, Box, Office 365 via SAML. Replaces the old per-account IAM user model.",      c:"Security"},
  {r:"AWS Artifact",         h:"Download AWS compliance reports (SOC, PCI, ISO...)",       d:"Self-service access to AWS's audit reports and certifications. Share them with your own auditors without waiting for AWS support.",                         c:"Security"},
  {r:"AWS Audit Manager",    h:"Continuous evidence collection for compliance audits",   d:"Maps AWS resource configurations to compliance frameworks (GDPR, PCI DSS, CIS). Assembles audit-ready reports automatically.",                              c:"Security"},
  {r:"Amazon Verified Permissions",h:"Fine-grained authorization engine for your own apps",d:"Externalizes your app's 'can user X do action Y on resource Z?' logic. Uses the Cedar policy language. Keeps auth logic out of app code.",              c:"Security"},
  {r:"Amazon Security Lake", h:"Centralize all security logs in one place",              d:"Aggregates CloudTrail, VPC Flow Logs, Route 53, and third-party tool logs into a normalized OCSF format in your own S3 bucket.",                           c:"Security"},

  // ── Management ──
  {r:"AWS CloudFormation",   h:"Describe your whole infrastructure in a YAML file",      d:"Define EC2, RDS, Lambda, VPCs — everything — as code. Deploy the same stack to dev, staging, and prod identically. Rollback on failure.",                   c:"Mgmt"},
  {r:"Amazon CloudWatch",    h:"Metrics, logs, and alarms for everything in AWS",        d:"Collects logs from every service, lets you create dashboards, set alarms on any metric, and trigger auto-scaling or Lambda reactions.",                      c:"Mgmt"},
  {r:"AWS CloudTrail",       h:"A full audit log of every API call in your account",     d:"Who did what, when, from which IP. Essential for security investigations, compliance audits, and debugging strange config changes.",                         c:"Mgmt"},
  {r:"AWS Config",           h:"Track every configuration change to every AWS resource", d:"Answers 'what did my security group look like 3 weeks ago?' Detects drift from compliant baselines. Triggers alerts on violations.",                        c:"Mgmt"},
  {r:"AWS Auto Scaling",     h:"Automatically add or remove capacity based on demand",   d:"Coordinates scaling across EC2, ECS, DynamoDB, Aurora, and Lambda. Sets min/max/desired and lets demand drive the middle.",                                 c:"Mgmt"},
  {r:"Amazon EC2 Auto Scaling",h:"Automatically scale EC2 instances to match demand",    d:"Specifically manages EC2 instance counts. Launches instances when demand rises, terminates them when it drops. Works with load balancer health checks.",      c:"Mgmt"},
  {r:"AWS Control Tower",    h:"Set up a secure multi-account AWS environment with guardrails",d:"Creates the account structure, enables CloudTrail/Config everywhere, and enforces preventative controls. The right starting point for enterprises.",    c:"Mgmt"},
  {r:"AWS Organizations",    h:"Manage many AWS accounts from one parent account",       d:"Group accounts into OUs, apply SCPs (permission boundaries), consolidate billing, and share resources between accounts.",                                    c:"Mgmt"},
  {r:"AWS Systems Manager",  h:"Patch, configure, and run commands on fleets of servers",d:"No SSH keys, no bastion hosts. Run scripts on thousands of EC2 or on-prem servers at once. Patch Manager handles OS updates.",                             c:"Mgmt"},
  {r:"AWS Trusted Advisor",  h:"Scans your account and flags waste, risks, and gaps",   d:"Checks for unused resources, open security groups, no MFA on root, over-provisioned instances. Like having an AWS expert review your account.",             c:"Mgmt"},
  {r:"AWS Compute Optimizer",h:"ML-based recommendations to right-size your EC2 and Lambda",d:"Analyzes your actual utilization and recommends cheaper or more appropriate instance types. Often finds 20-40% savings.",                              c:"Mgmt"},
  {r:"AWS Launch Wizard",    h:"Guided deployment for SAP, SQL Server, and other enterprise apps",d:"Answer a few questions; Launch Wizard provisions the right infrastructure. Generates a CloudFormation template you can reuse.",                   c:"Mgmt"},
  {r:"AWS License Manager",  h:"Track and enforce software licenses across your fleet",  d:"Prevent license overages for Microsoft, Oracle, and SAP by setting hard limits on how many instances can use each license.",                               c:"Mgmt"},
  {r:"AWS Service Catalog",  h:"IT-approved product catalog for self-service provisioning",d:"Admins define approved CloudFormation templates; developers deploy from the catalog without needing broad AWS permissions.",                              c:"Mgmt"},
  {r:"Amazon Managed Grafana",h:"Managed Grafana dashboards — no server to run",        d:"Connect to CloudWatch, Prometheus, X-Ray, and dozens of other data sources. Share dashboards with SSO. AWS handles upgrades.",                              c:"Mgmt"},
  {r:"Amazon Managed Prometheus",h:"Managed Prometheus metrics storage for Kubernetes", d:"Ingest metrics from your EKS clusters at scale without running Prometheus servers. Compatible with PromQL and existing exporters.",                         c:"Mgmt"},
  {r:"AWS Well-Architected Tool",h:"Score your workload against AWS best practices",    d:"Answer questions about your architecture; get a report of risks across the six pillars: security, reliability, performance, cost, ops, sustainability.",     c:"Mgmt"},
  {r:"AWS Health",           h:"Personalized alerts when AWS events affect your resources",d:"Notifies you before planned maintenance, when service events impact your specific accounts or regions. More targeted than the public status page.",       c:"Mgmt"},
  {r:"AWS OpsWorks",         h:"Managed Chef and Puppet for server configuration",       d:"Use code to configure your servers. OpsWorks manages the Chef/Puppet control plane so you only write recipes/manifests.",                                   c:"Mgmt"},
  {r:"AWS Proton",           h:"Platform engineering: standardize container and serverless deployments",d:"Platform teams define templates; developers self-serve deployments. Keeps infra consistent without a central ops bottleneck.",              c:"Mgmt"},
  {r:"AWS User Notifications",h:"Central hub for notifications from all AWS services",  d:"Route CloudWatch alarms, Config findings, and Health events to email, SMS, Slack, or push — from one place, with one format.",                             c:"Mgmt"},
  {r:"AWS Support",          h:"Technical support plans — Basic, Developer, Business, Enterprise",d:"Free Basic tier covers account and billing. Developer starts at $29/mo. Business adds 24/7 chat and 1-hour critical response. Enterprise provides a dedicated TAM and 15-minute critical SLA. CLF-C02 favorite.", c:"Mgmt"},

  // ── Integration ──
  {r:"AWS Step Functions",   h:"Visual state machine to orchestrate multi-step workflows",d:"Chain Lambdas, ECS tasks, and API calls into a workflow with branching, retries, and error handling. No glue code to maintain.",                         c:"Integration"},
  {r:"Amazon SQS",           h:"Message queue — decouple producers from consumers",      d:"Producer drops a message; consumer picks it up when ready. If the consumer crashes, the message stays in the queue. FIFO mode for strict ordering.",        c:"Integration"},
  {r:"Amazon SNS",           h:"Pub/sub — one message fans out to many subscribers",     d:"Publish once; SNS delivers to SQS queues, Lambda, HTTP endpoints, email, and SMS simultaneously. No polling needed.",                                      c:"Integration"},
  {r:"Amazon EventBridge",   h:"Event bus — route events from AWS and SaaS to targets", d:"Catch events from 90+ AWS services and SaaS apps (Shopify, Zendesk, etc.); route them to Lambda, SQS, or Step Functions by pattern.",                     c:"Integration"},
  {r:"Amazon MQ",            h:"Managed ActiveMQ or RabbitMQ — for existing message brokers",d:"Migrate your JMS or AMQP app to AWS without rewriting. No need to learn SQS. AWS manages the broker nodes.",                                         c:"Integration"},
  {r:"Amazon AppFlow",       h:"No-code data transfers between SaaS apps and AWS",       d:"Move Salesforce records to S3, Slack messages to Redshift, ServiceNow data to DynamoDB — on a schedule or triggered by events.",                          c:"Integration"},
  {r:"AWS B2B Data Interchange",h:"Transform EDI documents to JSON/XML automatically",  d:"Automates the processing of X12 EDI documents from suppliers and customers. Converts them into formats your modern apps understand.",                       c:"Integration"},

  // ── Dev tools ──
  {r:"AWS CodePipeline",     h:"CI/CD — automate build, test, deploy on every push",    d:"Connects GitHub/CodeCommit to CodeBuild to CodeDeploy into a pipeline. Visualizes every stage. Integrates with Jenkins and other tools.",                   c:"Dev tools"},
  {r:"AWS CodeBuild",        h:"Managed build server — no Jenkins to maintain",          d:"Runs your build commands in a fresh container. Scales to many parallel builds. Integrates natively into CodePipeline.",                                    c:"Dev tools"},
  {r:"AWS CodeDeploy",       h:"Deploy new code to EC2, Lambda, or on-prem servers",    d:"Rolling, blue/green, and canary deployments. Automatic rollback if health checks fail. Works with any language or framework.",                             c:"Dev tools"},
  {r:"AWS CodeCommit",       h:"Private Git repository hosted on AWS",                   d:"Standard Git repo. Integrates with IAM so you control access without a separate service. Being gradually deprecated in favor of GitHub/CodeCatalyst.",     c:"Dev tools"},
  {r:"AWS CodeArtifact",     h:"Private package repository for npm, PyPI, Maven, NuGet", d:"Cache public packages from npm/PyPI/Maven and publish private ones. IAM controls who can pull or publish.",                                               c:"Dev tools"},
  {r:"Amazon CodeCatalyst",  h:"Unified dev environment — issues, code, CI/CD in one",  d:"AWS's answer to GitHub with integrated AWS deployments. Blueprints scaffold a full project with repo, pipeline, and dev environment.",                    c:"Dev tools"},
  {r:"AWS Cloud9",           h:"Browser-based IDE with a terminal and AWS access",       d:"Full code editor + shell in your browser, pre-configured for AWS. No local install. Useful for quick edits or teaching.",                                  c:"Dev tools"},
  {r:"AWS CloudShell",       h:"Instant terminal in the AWS Console, pre-authenticated", d:"Click the shell icon in the console, and you're in a bash session with the AWS CLI ready. No local setup, no credentials to configure.",                  c:"Dev tools"},
  {r:"AWS X-Ray",            h:"Distributed tracing — see the path of every request",   d:"Instruments your app to trace requests across Lambda, EC2, and ECS. Generates a service map and highlights slow or failing segments.",                     c:"Dev tools"},
  {r:"AWS Fault Injection Service",h:"Deliberately break things to find hidden weaknesses",d:"Run controlled chaos engineering experiments: inject CPU spikes, network latency, or instance terminations. Measures how your app responds.",           c:"Dev tools"},
  {r:"Amazon Q Developer",   h:"AI coding assistant — in your IDE and the console",      d:"Writes code, explains errors, fixes vulnerabilities, and can perform multi-file refactors. Also upgrades Java versions automatically.",                    c:"Dev tools"},
  {r:"Amazon Corretto",      h:"Free, production-ready OpenJDK distribution from AWS",  d:"AWS's own build of JDK with long-term support. Used internally at Amazon. Certified compatible with Java SE. Drop-in for other JDKs.",                    c:"Dev tools"},
  {r:"AWS Infrastructure Composer",h:"Drag-and-drop IaC diagram builder",              d:"Draw your architecture visually; Infrastructure Composer generates CloudFormation or SAM templates. Good for prototyping and onboarding.",                  c:"Dev tools"},
  {r:"AWS SAM",              h:"Simplified CloudFormation for serverless apps",          d:"Shorthand syntax to define Lambda, API Gateway, and DynamoDB stacks. `sam local invoke` lets you test Lambda locally before deploying.",                   c:"Dev tools"},
  {r:"AWS CDK",              h:"Define AWS infrastructure in TypeScript, Python, Go...",  d:"Write real code instead of YAML. CDK synthesizes CloudFormation. Lets you use loops, functions, and type safety in your infrastructure.",                   c:"Dev tools"},
  {r:"AWS SimSpace Weaver",  h:"Run massive spatial simulations across managed compute", d:"Distribute a simulation (traffic, crowd, logistics) across many EC2 instances with a managed framework. Think city-scale digital twins.",        c:"Dev tools"},

  // ── Containers ──
  {r:"Amazon ECR",           h:"Private Docker image registry",                          d:"Store and version your container images. IAM-integrated so only authorized pipelines can push. Scans images for CVEs automatically.",                      c:"Containers"},
  {r:"Amazon ECS",           h:"Run Docker containers — AWS manages the orchestration", d:"Define tasks (containers), services (desired count), and clusters. AWS places containers on EC2 or Fargate and keeps the desired count running.",           c:"Containers"},
  {r:"Amazon EKS",           h:"Managed Kubernetes — AWS runs the control plane",        d:"Fully certified Kubernetes. AWS patches and scales the control plane. You manage node groups (or use Fargate for fully serverless pods).",                  c:"Containers"},
  {r:"AWS Copilot",          h:"CLI that simplifies building and deploying containers on ECS",d:"One command to init, build, and deploy containerized apps. Generates CloudFormation, handles load balancers, service discovery, and pipelines. Opinionated but fast.", c:"Containers"},
  {r:"AWS App2Container",    h:"Containerize your existing .NET and Java apps automatically",d:"Analyzes your running app, packages it into a Docker image, and generates ECS/EKS deployment configs. Migration tool.",                              c:"Containers"},
  {r:"Red Hat OpenShift on AWS",h:"Managed OpenShift (enterprise Kubernetes)",           d:"For teams standardized on OpenShift. AWS and Red Hat jointly operate the control plane. Same OpenShift APIs and tools.",                                   c:"Containers"},

  // ── IoT ──
  {r:"AWS IoT Core",         h:"Connect devices to AWS over MQTT — billions at scale",  d:"The central hub for IoT. Devices publish messages; rules route them to Lambda, S3, DynamoDB, or Kinesis in real time.",                                    c:"IoT"},
  {r:"AWS IoT Greengrass",   h:"Run Lambda and ML models on the device, offline",        d:"An AWS runtime that runs on your gateway or device. Processes data locally when there's no internet, syncs to cloud when connected.",                     c:"IoT"},
  {r:"AWS IoT Device Management",h:"Register, organize, and update millions of devices", d:"Bulk-register devices, organize them into groups, monitor connectivity, and push OTA firmware updates.",                                                   c:"IoT"},
  {r:"AWS IoT Device Defender",h:"Security auditing and anomaly detection for device fleets",d:"Audits device configurations against best practices. Alerts when a device talks to unexpected IPs or sends unusual traffic volumes.",                 c:"IoT"},
  {r:"AWS IoT SiteWise",     h:"Collect and model industrial equipment data",            d:"Connects to OPC-UA, Modbus, and other industrial protocols. Structures sensor data as asset hierarchies. Computes OEE and other KPIs.",                   c:"IoT"},
  {r:"AWS IoT TwinMaker",    h:"Build digital twins of buildings and factories",         d:"Links real-time sensor data to a 3D model of your physical space. Visualize operations, run simulations, and diagnose problems remotely.",                c:"IoT"},
  {r:"AWS IoT FleetWise",    h:"Collect and analyze vehicle telemetry at scale",         d:"Rules-based data collection from vehicle CAN buses. Send only interesting signals to the cloud instead of all data continuously.",                        c:"IoT"},
  {r:"AWS IoT ExpressLink",  h:"Hardware modules that add secure AWS connectivity to any device",d:"Partner-certified Wi-Fi/cellular modules with AWS credentials pre-provisioned. Attach to your MCU; it handles TLS and MQTT for you.",            c:"IoT"},
  {r:"AWS IoT Events",       h:"Detect event patterns across thousands of devices",      d:"Define state machines with if/then/else rules. IoT Events monitors your sensor streams and triggers alarms or Lambda when patterns match.",               c:"IoT"},
  {r:"AWS IoT Analytics",    h:"Time-series analytics pipeline for IoT data",            d:"Cleans, enriches, and stores IoT messages. Runs SQL queries on stored data. Built-in Jupyter notebooks for ad hoc analysis.",                            c:"IoT"},
  {r:"FreeRTOS",             h:"AWS-maintained OS for microcontrollers with cloud connectivity",d:"Extends the popular FreeRTOS kernel with libraries for TLS, MQTT, and OTA updates. The standard way to connect tiny MCUs to IoT Core.",          c:"IoT"},
  {r:"AWS IoT Button",       h:"A Wi-Fi button that triggers any AWS action",            d:"Developer toy. Click once, double-click, or long-press. Configure each action in Lambda. Used for demos, dashboards, and prototypes.",                    c:"IoT"},

  // ── Migration ──
  {r:"AWS Application Migration Service",h:"Lift-and-shift servers to AWS with minimal downtime",d:"Continuously replicates your on-prem servers to AWS. When ready, cut over. Source stays live until you're confident.",                        c:"Migration"},
  {r:"AWS Database Migration Service",h:"Migrate databases to AWS while they stay online",d:"Supports same-engine (MySQL to RDS MySQL) and cross-engine (Oracle to Aurora) migrations. Source DB keeps serving traffic throughout.",                      c:"Migration"},
  {r:"AWS DataSync",         h:"Fast automated file transfers from on-prem to S3 or EFS",d:"10x faster than open-source tools. Handles checksums, bandwidth throttling, and scheduling. No custom scripting needed.",                               c:"Migration"},
  {r:"AWS Snow Family",      h:"Physical devices to move massive data when the internet is too slow",d:"Snowball (8 TB portable), Snowball Edge (80 TB + compute), Snowmobile (100 PB truck). Load it, ship it, AWS ingests it.",                  c:"Migration"},
  {r:"AWS Transfer Family",  h:"SFTP / FTP / FTPS endpoint that stores files directly in S3",d:"Drop-in replacement for legacy FTP servers. Your partners connect with the same SFTP clients; files land in S3 automatically.",                    c:"Migration"},
  {r:"AWS Migration Hub",    h:"Single view of progress across all your migrations",     d:"Aggregates status from Application Migration Service, DMS, and partner tools. See which servers are migrated, in progress, or stuck.",                  c:"Migration"},
  {r:"AWS Application Discovery Service",h:"Map your on-prem servers and dependencies before migrating",d:"Discovers what's running on each server, measures utilization, and maps which servers talk to which. Feeds into Migration Hub.",       c:"Migration"},
  {r:"AWS Mainframe Modernization",h:"Migrate COBOL/PL1 mainframe apps to AWS",          d:"Automates refactoring of mainframe code and provides a managed runtime environment. Escape hardware licensing and staffing costs.",                     c:"Migration"},

  // ── Media ──
  {r:"Amazon Elastic Transcoder",h:"Convert media files to formats for any screen",     d:"Old-school media transcoding service. Upload a video; get back MP4/HLS/etc. For new projects prefer MediaConvert.",                                     c:"Media"},
  {r:"AWS Elemental MediaConvert",h:"Broadcast-grade video-on-demand transcoding",       d:"Converts source files to adaptive bitrate streams (HLS, DASH) with captions, DRM, and quality controls. For publishers and OTT.",                      c:"Media"},
  {r:"AWS Elemental MediaLive",h:"Encode live video streams for broadcast and streaming",d:"Processes live video feeds into ABR streams in real time. Used for live events, 24/7 channels, and news broadcasts.",                                  c:"Media"},
  {r:"AWS Elemental MediaPackage",h:"Prepare and protect live/VOD video for delivery",  d:"Packages your encoded streams into HLS/DASH/CMAF, applies DRM, and enables DVR features like pause and rewind.",                                       c:"Media"},
  {r:"AWS Elemental MediaStore",h:"Low-latency origin storage built for live video",     d:"Stores live video segments so CDNs can fetch them with consistent sub-second latency. Not a general-purpose S3 alternative.",                          c:"Media"},
  {r:"AWS Elemental MediaTailor",h:"Personalized ad insertion into video streams",       d:"Replaces generic ad breaks with ads targeted to each viewer without breaking playback quality or introducing buffering.",                               c:"Media"},
  {r:"AWS Elemental MediaConnect",h:"Reliable live video transport over IP",            d:"Replaces expensive satellite or fiber contribution links. Sends high-quality video between locations and into AWS with built-in redundancy.",            c:"Media"},
  {r:"Amazon Interactive Video Service",h:"Managed live streaming with less than 5s latency",    d:"RTMPS in, ultra-low-latency player SDK out. Add interactive overlays synchronized with the stream using timed metadata.",                             c:"Media"},
  {r:"Amazon Nimble Studio",h:"Cloud workstations for VFX and animation teams",         d:"Artists get a GPU workstation in a browser. Studios get elastic rendering and shared high-speed storage. No physical render farm needed.",             c:"Media"},

  // ── Business apps ──
  {r:"Amazon Connect",       h:"Cloud contact center — build a call center in clicks", d:"Self-service IVR designer, agent desktop, and built-in AI for call transcription, sentiment analysis, and next-best-action suggestions.",              c:"Business apps"},
  {r:"Amazon Chime",         h:"Video meetings, calls, and chat from AWS",              d:"Web conferencing with an SDK for embedding real-time video/audio into your own apps. Less common now that most teams use Zoom or Teams.",              c:"Business apps"},

// Dedup
const deduped = [];
const seen = new Set();
S.forEach(s => { const k = s.r+s.c; if(!seen.has(k)){seen.add(k);deduped.push(s);} });

const allCats = ["All", ...Object.keys(CAT)];
let active = "All";
let isDark = localStorage.getItem('dark') === 'true';

function applyDark(){
  document.documentElement.classList.toggle('dark', isDark);
}
applyDark();

function toggleDark(){
  isDark = !isDark;
  localStorage.setItem('dark', isDark);
  applyDark();
  render();
}

function clearSearch(){
  document.getElementById('q').value = '';
  document.getElementById('clearBtn').classList.add('hidden');
  render();
}

function render(){
  const q = document.getElementById("q").value.toLowerCase().trim();
  const clearBtn = document.getElementById("clearBtn");
  clearBtn.classList.toggle('hidden', !q);

  const words = q ? q.split(/\s+/) : [];
  const filtered = deduped.filter(s => {
    if(active !== "All" && s.c !== active) return false;
    if(!words.length) return true;
    const txt = (s.r+" "+s.h+" "+s.d+" "+s.c).toLowerCase();
    return words.every(w => txt.includes(w));
  });
  document.getElementById("meta").textContent = filtered.length + " of " + deduped.length + " services";
  const g = document.getElementById("grid");
  if(!filtered.length){
    g.innerHTML = '<div class="col-span-full py-16 text-center"><div class="text-slate-400 dark:text-slate-500 text-4xl mb-3">&#128270;</div><p class="text-slate-500 dark:text-slate-400 text-sm">No services match your search. Try a different keyword.</p></div>';
    return;
  }
  g.innerHTML = filtered.map(s => {
    const col = CAT[s.c] || {bg:"#E1F5EE",tc:"#085041",dkbg:"#042F2E",dktc:"#5EEAD4"};
    const badgeBg = isDark ? (col.dkbg||col.bg) : col.bg;
    const badgeTc = isDark ? (col.dktc||col.tc) : col.tc;
    return `<div class="group bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4 hover:border-slate-300 dark:hover:border-slate-700 hover:shadow-sm transition-all duration-150">
      <div class="flex items-start justify-between gap-2 mb-2">
        <div class="flex-1 min-w-0">
          <div class="mono text-[11px] text-slate-500 dark:text-slate-400 truncate mb-0.5">${s.r}</div>
          <div class="text-sm font-medium text-slate-900 dark:text-white leading-snug">${s.h}</div>
        </div>
        <span class="shrink-0 mt-0.5 text-[10px] font-medium px-2 py-0.5 rounded-full whitespace-nowrap" style="background:${badgeBg};color:${badgeTc}">${s.c}</span>
      </div>
      <p class="text-xs text-slate-600 dark:text-slate-400 leading-relaxed">${s.d}</p>
    </div>`;
  }).join("");
}

function buildPills(){
  document.getElementById("pills").innerHTML = allCats.map(c => {
    const isActive = c === active;
    const col = CAT[c];
    const base = "inline-flex items-center px-3 py-1 text-xs font-medium rounded-full cursor-pointer transition-all duration-150 whitespace-nowrap shrink-0 select-none";
    if(isActive && c !== "All" && col){
      return `<span class="${base}" style="background:${isDark?col.dkbg:col.bg};color:${isDark?col.dktc:col.tc}" onclick="setA('${c}')">${c}</span>`;
    }
    const activeClass = isActive
      ? "bg-amber-100 dark:bg-amber-900/40 text-amber-800 dark:text-amber-300 border-amber-300 dark:border-amber-700"
      : "bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700";
    return `<span class="${base} border ${activeClass}" onclick="setA('${c}')">${c}</span>`;
  }).join("");
}

function setA(c){ active=c; buildPills(); render(); }

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if(e.key === '/' && document.activeElement !== document.getElementById('q')){
    e.preventDefault();
    document.getElementById('q').focus();
  }
  if(e.key === 'Escape'){
    document.getElementById('q').blur();
    clearSearch();
  }
});

buildPills();
render();
</script>

</html>
